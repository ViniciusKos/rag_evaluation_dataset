[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "qa-pairs-generator-for-rag-evaluation"
version = "0.1.0"
description = "Generate QA pairs from JSON documents to evaluate RAG pipelines"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "openai>=1.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
]

[project.scripts]
qa-generate = "src.pipeline:main"

[tool.hatch.build.targets.wheel]
packages = ["src", "utils"]
